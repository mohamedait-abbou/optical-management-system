services:

  app:
    build:
      context: .
    container_name: optical-crm
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql


  mysql:
    image: mysql:8
    container_name: optical-mysql

    environment:
      MYSQL_DATABASE: optical_crm
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
     - mysql_data:/var/lib/mysql



volumes:
  mysql_data: